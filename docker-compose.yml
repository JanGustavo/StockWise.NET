version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: stockwise_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: stockwisedb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: src/StockWise.API/Dockerfile
    container_name: stockwise_api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=secretpassword
      - DB_NAME=stockwisedb
    depends_on:
      - db

  blazor:
    build:
      context: .
      dockerfile: src/StockWise.Blazor/Dockerfile
    container_name: stockwise_blazor
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata: